[SERVICE]
    Flush         5
    Daemon        Off
    Log_Level     info
    Parsers_File  /fluent-bit/etc/parsers.conf
    storage.path  /tmp/flb-storage
    storage.sync  normal

# ─── INPUT: Auth Log (SSH, sudo, login) ──────────────────────
[INPUT]
    Name             tail
    Path             /hostlogs/auth.log
    Tag              ssh
    DB               /tmp/flb_auth.db
    Mem_Buf_Limit    10MB
    Skip_Long_Lines  On
    Refresh_Interval 5
    Read_from_Head   False

# ─── INPUT: Syslog ───────────────────────────────────────────
[INPUT]
    Name             tail
    Path             /hostlogs/syslog
    Tag              syslog
    DB               /tmp/flb_syslog.db
    Mem_Buf_Limit    10MB
    Skip_Long_Lines  On
    Refresh_Interval 10
    Read_from_Head   False

# ─── INPUT: Apache Access Log ────────────────────────────────
[INPUT]
    Name             tail
    Path             /hostlogs/apache2/access.log
    Tag              apache
    Parser           apache_parser
    DB               /tmp/flb_apache.db
    Mem_Buf_Limit    10MB
    Skip_Long_Lines  On
    Refresh_Interval 5
    Read_from_Head   False

# ─── INPUT: Apache Error Log ─────────────────────────────────
[INPUT]
    Name             tail
    Path             /hostlogs/apache2/error.log
    Tag              apache_error
    DB               /tmp/flb_apache_err.db
    Mem_Buf_Limit    5MB
    Skip_Long_Lines  On
    Refresh_Interval 5
    Read_from_Head   False

# ─── FILTER: Tambah metadata agent ───────────────────────────
[FILTER]
    Name    record_modifier
    Match   *
    Record  agent_host musa-ubuntu
    Record  agent_os   linux
    Record  agent_ip   192.168.0.101

# ─── FILTER: Parse SSH log ───────────────────────────────────
[FILTER]
    Name         parser
    Match        ssh
    Key_Name     log
    Parser       syslog-rfc3164
    Reserve_Data True

# ─── OUTPUT: Kirim ke ML Engine central ──────────────────────
[OUTPUT]
    Name          http
    Match         *
    Host          192.168.0.101
    Port          8080
    URI           /ingest
    Format        json_lines
    Workers       2
    Retry_Limit   3

# ─── OUTPUT: Debug stdout (bisa dinonaktifkan) ───────────────
# [OUTPUT]
#     Name   stdout
#     Match  *
#     Format json_lines
