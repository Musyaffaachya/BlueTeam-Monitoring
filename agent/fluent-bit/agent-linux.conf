# ============================================================
#  BLUETEAM AGENT CONFIG - Linux
#  Copy file ini ke mesin target, isi CENTRAL_SERVER_IP
#  lalu jalankan: docker run atau install fluent-bit
# ============================================================

[SERVICE]
    Flush         5
    Daemon        Off
    Log_Level     warn
    Parsers_File  /fluent-bit/etc/parsers.conf
    storage.path  /tmp/fluent-bit-storage
    storage.sync  normal

# ─── INPUT: SSH / Auth Logs ──────────────────────────────────
[INPUT]
    Name            tail
    Path            /var/log/auth.log
    Tag             ssh
    Parser          syslog-rfc3164
    DB              /tmp/flb_ssh.db
    Mem_Buf_Limit   10MB
    Skip_Long_Lines On
    Refresh_Interval 5

# ─── INPUT: Syslog ───────────────────────────────────────────
[INPUT]
    Name            tail
    Path            /var/log/syslog
    Tag             syslog
    Parser          syslog-rfc3164
    DB              /tmp/flb_syslog.db
    Mem_Buf_Limit   10MB
    Skip_Long_Lines On
    Refresh_Interval 10

# ─── INPUT: Apache Access Log ────────────────────────────────
[INPUT]
    Name            tail
    Path            /var/log/apache2/access.log
    Tag             apache
    Parser          apache_parser
    DB              /tmp/flb_apache.db
    Mem_Buf_Limit   10MB
    Skip_Long_Lines On
    Refresh_Interval 5

# ─── INPUT: Apache Error Log ─────────────────────────────────
[INPUT]
    Name            tail
    Path            /var/log/apache2/error.log
    Tag             apache_error
    DB              /tmp/flb_apache_err.db
    Mem_Buf_Limit   5MB
    Skip_Long_Lines On
    Refresh_Interval 5

# ─── INPUT: Docker Container Logs ────────────────────────────
[INPUT]
    Name            tail
    Path            /var/lib/docker/containers/*/*.log
    Tag             docker.<container_id>
    Tag_Regex       (?<container_id>[a-f0-9]+)/[a-f0-9]+-json.log$
    Parser          docker_parser
    DB              /tmp/flb_docker.db
    Mem_Buf_Limit   20MB
    Skip_Long_Lines On
    Refresh_Interval 5

# ─── INPUT: UFW / Firewall Logs ──────────────────────────────
[INPUT]
    Name            tail
    Path            /var/log/ufw.log
    Tag             firewall
    DB              /tmp/flb_firewall.db
    Mem_Buf_Limit   10MB
    Skip_Long_Lines On
    Refresh_Interval 5

# ─── FILTER: Tambah metadata agent ───────────────────────────
[FILTER]
    Name            record_modifier
    Match           *
    Record          agent_host ${HOSTNAME}
    Record          agent_os   linux

# ─── OUTPUT: Kirim ke Central Server ─────────────────────────
[OUTPUT]
    Name            forward
    Match           *
    Host            CENTRAL_SERVER_IP    # <── Ganti dengan IP server kamu
    Port            5170
    Retry_Limit     5
    Workers         2
