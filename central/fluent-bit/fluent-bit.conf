[SERVICE]
    Flush         2
    Daemon        Off
    Log_Level     info
    Parsers_File  parsers.conf
    HTTP_Server   On
    HTTP_Listen   0.0.0.0
    HTTP_Port     2020
    storage.metrics on

[INPUT]
    Name              forward
    Listen            0.0.0.0
    Port              5170
    Tag               agent.*

[INPUT]
    Name          syslog
    Mode          tcp
    Listen        0.0.0.0
    Port          5140
    Tag           syslog.tcp
    Parser        syslog-rfc3164

[INPUT]
    Name          syslog
    Mode          udp
    Listen        0.0.0.0
    Port          5140
    Tag           syslog.udp
    Parser        syslog-rfc3164

[FILTER]
    Name          record_modifier
    Match         *
    Record        received_by central-server

[FILTER]
    Name          parser
    Match         agent.ssh
    Key_Name      message
    Parser        ssh_parser
    Reserve_Data  True

[FILTER]
    Name          parser
    Match         agent.apache
    Key_Name      message
    Parser        apache_parser
    Reserve_Data  True

[OUTPUT]
    Name          http
    Match         *
    Host          ml-engine
    Port          8080
    URI           /ingest
    Format        json_lines
    Workers       2
    Retry_Limit   3
